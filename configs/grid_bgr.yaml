experiment:
  name: grid_recovery_v1
  seeds: [0, 1, 2]
  methods: [uniform, fixed, failure_only, plr_loss, bgr]
  num_tasks: 12
  grid_size: 9
  obstacle_prob: 0.18
  replay_states_per_task: 3
  max_offset: 4
  horizon: 24
  iterations: 90
  eval_every: 30
  train_batch_size: 24
  eval_trials_per_radius: 3
  eval_grid_size: 7
  alpha: 0.8
  learning_rate: 1.0
  fixed_radius: 0.75
  target_margin: 0.45
  baseline_candidates: 8
  failure_probe_trials: 1
bgr:
  initial_probes: [0.0, 0.25, 0.5, 0.75, 1.0]
  refresh_per_eval: 24
  min_trials: 2
  radius_noise: 0.08
  priority_temperature: 0.8
  uniform_mix: 0.10
