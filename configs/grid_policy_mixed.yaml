experiment:
  name: grid_policy_mixed_v1
  seeds: [0, 1, 2]
  methods: [uniform, fixed, plr_loss, bgr, bgr_mixed]
  num_tasks: 24
  grid_size: 11
  obstacle_prob: 0.24
  replay_states_per_task: 4
  max_offset: 5
  horizon: 34
  iterations: 100
  eval_every: 25
  train_batch_size: 24
  eval_trials_per_radius: 4
  eval_grid_size: 7
  alpha: 0.8
  learning_rate: 0.45
  clean_pretrain_steps: 2
  fixed_radius: 0.70
  target_margin: 0.35
  baseline_candidates: 12
  failure_probe_trials: 1
bgr:
  initial_probes: [0.0, 0.25, 0.5, 0.75, 1.0]
  refresh_per_eval: 48
  min_trials: 2
  radius_noise: 0.08
  mixed_clean_radius_prob: 0.20
  mixed_uniform_radius_prob: 0.45
  priority_temperature: 0.75
  uniform_mix: 0.15
